{% if self::week::is_logsday(*user.week_len, *user.logsday_weekday) %}
    <span>Logsday ends: <span id="countdown" time-duration="{{ self::week::time_left_today() }}"></span></span>
{% else %}
    <span>Next Logsday: <span id="countdown" time-duration="{{ self::week::time_until_next_logsday(*user.week_len, *user.logsday_weekday) }}"></span></span>
{% endif %}
