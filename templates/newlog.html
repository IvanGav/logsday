{% extends "base.html" %}

{% block content %}
    <script>
        function checkFileSize(input) {
            const limit = 2 * 1024 * 1024; // 2MB
            if (input.files[0].size > limit) {
                alert("This file is too big! Please choose an image under 2MB.");
                input.value = ""; // Clear the input
            }
        }
    </script>

    <form hx-post="/new/log/{{ project.slug }}" hx-encoding="multipart/form-data">
        <input type="text" name="title" placeholder="Log Title" required>
        <input type="text" name="slug" placeholder="Log Slug"> <!-- TODO make it autofill with JS, unless a value is manually entered -->
        <input type="file" name="thumbnail" accept="image/*" id="thumbnail-input" onchange="checkFileSize(this)">
        <textarea name="content" required></textarea>
        <button type="submit">Create Log for {{ project.title }}</button>
    </form>
{% endblock %}
